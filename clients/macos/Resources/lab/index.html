<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Argus Lab</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header id="masthead" class="masthead"></header>
    <div class="workspace">
      <aside id="context" class="context-panel" aria-label="Lab navigation"></aside>
      <main id="main" class="main-panel" tabindex="-1"></main>
    </div>
  </div>

  <button id="drawer-scrim" class="drawer-scrim" type="button" aria-label="Close navigation"></button>
  <div id="toast-region" class="toast-region" aria-live="polite" aria-atomic="true"></div>

  <script src="app.js"></script>
  <script src="fixtures.js"></script>
</body>
</html>
