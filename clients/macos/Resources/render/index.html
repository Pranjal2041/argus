<!doctype html>
<!-- Argus "Renders": offline markdown + LaTeX + code view of terminal content.
     Loaded from the app bundle (no network). Driven via window.UTRender.
     LIGHT theme on purpose: this is a reading surface (a "document"), distinct
     from the dark terminal it lifts text out of. -->
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="katex/katex.min.css">
<link rel="stylesheet" href="hljs/github.min.css">
<style>
  :root { color-scheme: light; }
  html, body { margin: 0; padding: 0; background: #FBFBFA; }
  body {
    color: #1F2328;
    font: 16px/1.7 -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: 30px 40px 56px;
    max-width: 740px;
    margin: 0 auto;
    word-wrap: break-word;
  }
  h1, h2, h3, h4 { color: #111418; line-height: 1.3; margin: 1.4em 0 0.55em; font-weight: 650; }
  h1 { font-size: 1.55em; border-bottom: 1px solid #E4E4E0; padding-bottom: .3em; }
  h2 { font-size: 1.3em; }
  h3 { font-size: 1.12em; }
  p { margin: .65em 0; }
  a { color: #0B62D6; }
  hr { border: none; border-top: 1px solid #E4E4E0; margin: 1.6em 0; }
  blockquote { margin: .9em 0; padding: .05em 1.1em; border-left: 3px solid #D4D4CF; color: #57606A; }
  code { font: 13.5px/1.55 "SF Mono", Menlo, monospace; background: #F0F0EE; border-radius: 4px; padding: .1em .35em; color: #24292F; }
  pre { background: #F6F6F4; border: 1px solid #E4E4E0; border-radius: 8px; padding: 13px 16px; overflow-x: auto; }
  pre code { background: none; padding: 0; display: block; font-size: 13px; }
  table { border-collapse: collapse; margin: 1em 0; display: block; overflow-x: auto; }
  th, td { border: 1px solid #DDDDD8; padding: 6px 13px; }
  th { background: #F2F2EF; color: #111418; }
  tr:nth-child(2n) td { background: #FAFAF8; }
  ul, ol { padding-left: 1.55em; margin: .65em 0; }
  li { margin: .3em 0; }
  li > p { margin: .3em 0; }
  strong { font-weight: 650; color: #111418; }
  .katex { font-size: 1.06em; }
  .katex-display { overflow-x: auto; overflow-y: hidden; padding: 4px 0; margin: 1em 0; }
  #empty { color: #8B949E; text-align: center; margin-top: 80px; font-size: 13px; }
  /* Verbatim terminal segments (tables, rules, aligned columns): exactly as
     the terminal typeset them — monospace, no wrap, quiet background. */
  pre.term {
    background: #FAFAF8; border: 1px solid #ECECEA; border-radius: 8px;
    padding: 10px 14px; overflow-x: auto;
    font: 12px/1.45 "SF Mono", Menlo, monospace; color: #24292F;
  }
  .jblock { position: relative; margin: .9em 0; }
  .jblock pre { margin: 0; }
  .jtoggle {
    position: absolute; top: 7px; right: 8px; z-index: 1;
    font: 10.5px -apple-system, sans-serif; color: #57606A;
    background: #FFFFFFD8; border: 1px solid #DDDDD8; border-radius: 5px;
    padding: 2px 8px; cursor: pointer;
  }
  .jtoggle:hover { color: #1F2328; background: #FFF; }
</style>
<script src="marked.min.js"></script>
<script src="katex/katex.min.js"></script>
<script src="hljs/highlight.min.js"></script>
</head>
<body>
<div id="out"><div id="empty">Nothing to render</div></div>
<script>
(function () {
  marked.setOptions({ gfm: true, breaks: false });

  // GROUND RULE: terminal content is a MIX of (a) markdown/TeX SOURCE shown as
  // raw text — worth rendering, (b) content the terminal ALREADY typeset
  // (box-drawn tables, aligned columns, rules) — must be preserved verbatim,
  // and (c) data (JSON), possibly line-broken mid-token by the TUI's own
  // wrapping. Markdown is therefore OPT-IN PER SEGMENT, never global: lines
  // with box-drawing/block characters form verbatim segments rendered exactly
  // as the terminal had them; only the prose runs between them get the
  // markdown/math/JSON pipeline. The cost asymmetry drives the bias: prose
  // accidentally shown monospace is mildly ugly, a table run through markdown
  // is destroyed.
  function render(md) {
    const out = document.getElementById("out");
    if (!md || !md.trim()) {
      out.innerHTML = '<div id="empty">Nothing to render</div>';
      return;
    }

    // Code fences are explicit author intent — shield them before segmentation
    // so a fence containing box art isn't split into a verbatim segment.
    const code = [];
    const text = md.replace(/^(```|~~~)[\s\S]*?^\1[ \t]*$/gm, (m) => {
      code.push(m); return "⟦UTCODE" + (code.length - 1) + "⟧";
    });

    jsonBlocks = [];
    const html = segment(text)
      .map((s) => s.verbatim
        ? '<pre class="term">' + escapeHtml(s.text) + "</pre>"
        : renderProse(s.text, code))
      .join("\n");

    out.innerHTML = html;
    out.querySelectorAll("pre code").forEach((el) => hljs.highlightElement(el));
  }

  // Box-drawing, block elements, and legacy +---+ rules mark a line as
  // "already typeset by the terminal". GFM pipe tables (ASCII |) stay prose so
  // real markdown tables keep rendering as HTML tables.
  const ARTY = /[─-╿▀-▟]/;
  const ASCII_RULE = /^[ \t]*\+[-+=]{4,}\+?[ \t]*$/;

  function segment(text) {
    const segs = [];
    let cur = null, curVerbatim = false;
    const push = () => {
      if (cur) segs.push({ verbatim: curVerbatim, text: cur.join("\n").replace(/\n+$/, "") });
      cur = null;
    };
    for (const ln of text.split("\n")) {
      const arty = ARTY.test(ln) || ASCII_RULE.test(ln);
      const blank = ln.trim() === "";
      if (!cur) { cur = [ln]; curVerbatim = arty; continue; }
      if (blank || arty === curVerbatim) { cur.push(ln); continue; }
      push();
      cur = [ln];
      curVerbatim = arty;
    }
    push();
    return segs;
  }

  // The markdown/math/JSON pipeline, applied to ONE prose segment:
  // (1) shield inline code, (2) lift JSON objects into blocks, (3) extract
  // math into placeholders BEFORE marked (it mangles raw TeX: \! \_ escapes,
  // _emphasis_), (4) un-shield code + marked, (5) restore math via
  // katex.renderToString and JSON via styled blocks.
  //
  // Inline $…$ tolerates single newlines: agent TUIs hard-wrap their output at
  // the pane width, so a span often straddles a line break. Markdown renders a
  // single newline inside a paragraph as a space anyway, so joining is exactly
  // its semantics. A blank line still terminates, and a length cap stops a
  // stray $ from pairing across half the document.
  function renderProse(seg, code) {
    let text = seg.replace(/`[^`\n]+`/g, (m) => {
      code.push(m); return "⟦UTCODE" + (code.length - 1) + "⟧";
    });

    {
      const spans = findJSONSpans(text);
      for (let k = spans.length - 1; k >= 0; k--) {
        const [a, b, parsed] = spans[k];
        const idx = jsonBlocks.length;
        jsonBlocks.push({ raw: text.slice(a, b), pretty: prettyJSON(parsed), pretty_on: true });
        text = text.slice(0, a) + "\n\n⟦UTJSON" + idx + "⟧\n\n" + text.slice(b);
      }
    }

    const math = [];
    const stash = (tex, display) => {
      math.push({ tex, display });
      return "⟦UTMATH" + (math.length - 1) + "⟧";
    };
    const sane = (t) => !/\n[ \t]*\n/.test(t) && /[\\^_{}]|[a-zA-Z]/.test(t);
    text = text
      .replace(/\$\$([\s\S]+?)\$\$/g, (_, t) => stash(t, true))
      .replace(/\\\[([\s\S]+?)\\\]/g, (_, t) => stash(t, true))
      .replace(/\\\(([\s\S]+?)\\\)/g, (m, t) => sane(t) ? stash(t, false) : m)
      .replace(/\$([^\s$][^$]{0,400}?[^\s$]|\S)\$/g, (m, t) => sane(t) ? stash(t.replace(/\s*\n\s*/g, " "), false) : m);

    text = text.replace(/⟦UTCODE(\d+)⟧/g, (_, i) => code[+i]);
    let html = marked.parse(text);

    html = html.replace(/⟦UTMATH(\d+)⟧/g, (_, i) => {
      const m = math[+i];
      try {
        return katex.renderToString(m.tex, { displayMode: m.display, throwOnError: false });
      } catch (e) {
        return m.tex;
      }
    });

    html = html.replace(/⟦UTJSON(\d+)⟧/g, (_, i) =>
      '<div class="jblock"><button class="jtoggle" data-i="' + i + '">Raw</button>' +
      '<pre><code class="language-json">' + escapeHtml(jsonBlocks[+i].pretty) + "</code></pre></div>");

    return html;
  }

  let jsonBlocks = [];

  // A balanced span must parse as JSON to qualify — but the TUI may have
  // hard-wrapped it MID-TOKEN at the pane width ("inplan\ne": 1.8), which puts
  // raw newlines inside strings/numbers. Retry order: verbatim, then newlines
  // removed (mid-token wrap), then newlines as spaces. No other repair —
  // Python reprs etc. stay text.
  function parseJSONish(cand) {
    for (const s of [cand, cand.replace(/[ \t]*\n[ \t]*/g, ""), cand.replace(/[ \t]*\n[ \t]*/g, " ")]) {
      try { return JSON.parse(s); } catch (e) { /* next */ }
    }
    return undefined;
  }

  // String-aware balanced-brace scan; a span qualifies only if it parses.
  function findJSONSpans(text) {
    const spans = [];
    let i = 0;
    while (i < text.length) {
      const c = text[i];
      if (c === "{" || c === "[") {
        const end = matchBracket(text, i);
        if (end > i) {
          const cand = text.slice(i, end + 1);
          if (cand.length >= 40) {
            const v = parseJSONish(cand);
            if (v && typeof v === "object" &&
                (Array.isArray(v) ? cand.length >= 80 : Object.keys(v).length >= 2)) {
              spans.push([i, end + 1, v]);
              i = end + 1;
              continue;
            }
          }
        }
      }
      i++;
    }
    return spans;
  }

  function matchBracket(text, start) {
    let depth = 0, inStr = false;
    const limit = Math.min(text.length, start + 50000);
    for (let i = start; i < limit; i++) {
      const ch = text[i];
      if (inStr) {
        if (ch === "\\") i++;
        else if (ch === '"') inStr = false;
      } else if (ch === '"') inStr = true;
      else if (ch === "{" || ch === "[") depth++;
      else if (ch === "}" || ch === "]") {
        depth--;
        if (depth === 0) return i;
        if (depth < 0) return -1;
      }
    }
    return -1;
  }

  function escapeHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  // Compact pretty-printer: anything that fits in ~64 chars stays on one line
  // (coordinate arrays, small tuples), bigger structures break per entry —
  // far denser than JSON.stringify(v, null, 2) for data-heavy objects.
  function prettyJSON(v, ind = "") {
    const one = JSON.stringify(v);
    if (one.length <= 64) return one;
    const ind2 = ind + "  ";
    if (Array.isArray(v)) {
      return "[\n" + v.map((x) => ind2 + prettyJSON(x, ind2)).join(",\n") + "\n" + ind + "]";
    }
    if (v && typeof v === "object") {
      return "{\n" + Object.entries(v).map(([k, x]) =>
        ind2 + JSON.stringify(k) + ": " + prettyJSON(x, ind2)).join(",\n") + "\n" + ind + "}";
    }
    return one;
  }

  // Per-block Format/Raw toggle (event delegation survives re-renders).
  document.addEventListener("click", (e) => {
    const btn = e.target.closest(".jtoggle");
    if (!btn) return;
    const b = jsonBlocks[+btn.dataset.i];
    if (!b) return;
    b.pretty_on = !b.pretty_on;
    btn.textContent = b.pretty_on ? "Raw" : "Format";
    const codeEl = btn.parentElement.querySelector("code");
    codeEl.textContent = b.pretty_on ? b.pretty : b.raw;
    delete codeEl.dataset.highlighted;   // hljs 11 refuses to re-highlight otherwise
    hljs.highlightElement(codeEl);
  });

  window.UTRender = {
    set(md, px) { if (px) this.setZoom(px); render(md); },
    setZoom(px) { document.body.style.fontSize = px + "px"; },
  };
})();
</script>
</body>
</html>
