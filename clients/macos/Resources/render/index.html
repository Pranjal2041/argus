<!doctype html>
<!-- Argus "Renders": offline markdown + LaTeX + code view of terminal content.
     Loaded from the app bundle (no network). Driven via window.UTRender. -->
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="katex/katex.min.css">
<link rel="stylesheet" href="hljs/github-dark.min.css">
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; padding: 0; background: #0D0E12; }
  body {
    color: #C8CCDC;
    font: 14px/1.65 -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: 22px 28px 40px;
    max-width: 860px;
    margin: 0 auto;
    word-wrap: break-word;
  }
  h1, h2, h3, h4 { color: #E6E9F2; line-height: 1.3; margin: 1.2em 0 0.5em; }
  h1 { font-size: 1.6em; border-bottom: 1px solid #23263A; padding-bottom: .25em; }
  h2 { font-size: 1.35em; }
  h3 { font-size: 1.15em; }
  a { color: #7AA2F7; }
  hr { border: none; border-top: 1px solid #23263A; margin: 1.4em 0; }
  blockquote { margin: .8em 0; padding: .1em 1em; border-left: 3px solid #3B4261; color: #9AA5CE; }
  code { font: 12.5px/1.5 "SF Mono", Menlo, monospace; background: #1A1D29; border-radius: 4px; padding: .12em .35em; }
  pre { background: #13151F; border: 1px solid #23263A; border-radius: 8px; padding: 12px 14px; overflow-x: auto; }
  pre code { background: none; padding: 0; display: block; }
  table { border-collapse: collapse; margin: .9em 0; display: block; overflow-x: auto; }
  th, td { border: 1px solid #2A2D40; padding: 5px 11px; }
  th { background: #181B27; color: #E6E9F2; }
  tr:nth-child(2n) td { background: #11131C; }
  ul, ol { padding-left: 1.5em; }
  li { margin: .15em 0; }
  .katex { font-size: 1.08em; }
  .katex-display { overflow-x: auto; overflow-y: hidden; padding: 2px 0; }
  #empty { color: #565F89; text-align: center; margin-top: 80px; font-size: 13px; }
</style>
<script src="marked.min.js"></script>
<script src="katex/katex.min.js"></script>
<script src="hljs/highlight.min.js"></script>
</head>
<body>
<div id="out"><div id="empty">Nothing to render</div></div>
<script>
(function () {
  marked.setOptions({ gfm: true, breaks: false });

  // Math must be extracted BEFORE markdown parsing: marked treats \! \_ \{ as
  // escapes and _x_ as emphasis, mangling any TeX it touches. So: (1) shield
  // code fences/spans so a $ inside code is never taken as math, (2) pull math
  // spans out into placeholder tokens, (3) un-shield code and run marked,
  // (4) replace each token with katex.renderToString of the RAW TeX.
  function render(md) {
    const out = document.getElementById("out");
    if (!md || !md.trim()) {
      out.innerHTML = '<div id="empty">Nothing to render</div>';
      return;
    }

    // (1) shield code regions (fences, then inline spans)
    const code = [];
    let text = md.replace(/^(```|~~~)[\s\S]*?^\1[ \t]*$/gm, (m) => {
      code.push(m); return "⟦UTCODE" + (code.length - 1) + "⟧";
    });
    text = text.replace(/`[^`\n]+`/g, (m) => {
      code.push(m); return "⟦UTCODE" + (code.length - 1) + "⟧";
    });

    // (2) extract math: display forms first, then inline
    const math = [];
    const stash = (tex, display) => {
      math.push({ tex, display });
      return "⟦UTMATH" + (math.length - 1) + "⟧";
    };
    text = text
      .replace(/\$\$([\s\S]+?)\$\$/g, (_, t) => stash(t, true))
      .replace(/\\\[([\s\S]+?)\\\]/g, (_, t) => stash(t, true))
      .replace(/\\\(([\s\S]+?)\\\)/g, (_, t) => stash(t, false))
      // inline $…$: single line, non-empty, no spaces hugging the delimiters,
      // and not a bare number range like "$5-$10" (require a TeX-ish char).
      .replace(/\$([^\s$][^$\n]*?[^\s$]|\S)\$/g, (m, t) =>
        /[\\^_{}]|[a-zA-Z]/.test(t) ? stash(t, false) : m);

    // (3) un-shield code, parse markdown
    text = text.replace(/⟦UTCODE(\d+)⟧/g, (_, i) => code[+i]);
    let html = marked.parse(text);

    // (4) restore math as KaTeX output (raw TeX, untouched by marked)
    html = html.replace(/⟦UTMATH(\d+)⟧/g, (_, i) => {
      const m = math[+i];
      try {
        return katex.renderToString(m.tex, { displayMode: m.display, throwOnError: false });
      } catch (e) {
        return m.tex;
      }
    });

    out.innerHTML = html;
    out.querySelectorAll("pre code").forEach((el) => hljs.highlightElement(el));
  }

  window.UTRender = {
    set(md, px) { if (px) this.setZoom(px); render(md); },
    setZoom(px) { document.body.style.fontSize = px + "px"; },
  };
})();
</script>
</body>
</html>
