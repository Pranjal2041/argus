<!doctype html>
<!-- Argus "Renders": a faithful styled terminal document plus an optional
     Markdown + LaTeX + code interpretation of its plain source. Loaded from the
     app bundle (no network). Driven via window.UTRender. -->
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="katex/katex.min.css">
<link rel="stylesheet" href="hljs/github.min.css" id="hljs-light">
<link rel="stylesheet" href="hljs/github-dark.min.css" id="hljs-dark" disabled>
<style>
  :root { color-scheme: light; }
  html, body { margin: 0; padding: 0; background: var(--ut-bg, #FBFBFA); }
  body {
    color: var(--ut-fg, #1F2328);
    font: 16px/1.7 -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: 30px 40px 56px;
    max-width: 740px;
    margin: 0 auto;
    word-wrap: break-word;
  }
  /* Faithful mode is an editorial terminal folio: it reproduces the exact cell
     styling and visual rows SwiftTerm drew, but removes the live cursor/input
     behavior. No Markdown guessing occurs on this surface. */
  html.terminal-fidelity, html.terminal-fidelity body {
    background: var(--term-bg, #11131A);
  }
  html.terminal-fidelity body {
    color: var(--term-fg, #E8E9EE);
    max-width: none;
    margin: 0;
    padding: 26px 32px 52px;
    word-wrap: normal;
    overflow-wrap: normal;
    -webkit-font-smoothing: antialiased;
  }
  .terminal-page {
    box-sizing: border-box;
    width: max-content;
    min-width: 100%;
    font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
    font-variant-ligatures: none;
    line-height: 1.48;
    letter-spacing: 0;
  }
  .terminal-row {
    min-height: 1.48em;
    white-space: pre;
  }
  .terminal-row a { color: inherit; text-decoration-color: currentColor; }
  @media print {
    html.terminal-fidelity, html.terminal-fidelity body {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  }
  h1, h2, h3, h4 { color: #111418; line-height: 1.3; margin: 1.4em 0 0.55em; font-weight: 650; }
  h1 { font-size: 1.55em; border-bottom: 1px solid #E4E4E0; padding-bottom: .3em; }
  h2 { font-size: 1.3em; }
  h3 { font-size: 1.12em; }
  p { margin: .65em 0; }
  a { color: #0B62D6; }
  hr { border: none; border-top: 1px solid #E4E4E0; margin: 1.6em 0; }
  blockquote { margin: .9em 0; padding: .05em 1.1em; border-left: 3px solid #D4D4CF; color: #57606A; }
  code { font: 13.5px/1.55 "SF Mono", Menlo, monospace; background: #F0F0EE; border-radius: 4px; padding: .1em .35em; color: #24292F; }
  pre { background: #F6F6F4; border: 1px solid #E4E4E0; border-radius: 8px; padding: 13px 16px; overflow-x: auto; }
  pre code { background: none; padding: 0; display: block; font-size: 13px; }
  table { border-collapse: collapse; margin: 1em 0; display: block; overflow-x: auto; }
  th, td { border: 1px solid #DDDDD8; padding: 6px 13px; }
  th { background: #F2F2EF; color: #111418; }
  tr:nth-child(2n) td { background: #FAFAF8; }
  ul, ol { padding-left: 1.55em; margin: .65em 0; }
  li { margin: .3em 0; }
  li > p { margin: .3em 0; }
  strong { font-weight: 650; color: #111418; }
  .katex { font-size: 1.06em; }
  .katex-display { overflow-x: auto; overflow-y: hidden; padding: 4px 0; margin: 1em 0; }
  #empty { color: #8B949E; text-align: center; margin-top: 80px; font-size: 13px; }
  /* Verbatim terminal segments (tables, rules, aligned columns): exactly as
     the terminal typeset them — monospace, no wrap, quiet background. */
  pre.term {
    background: #FAFAF8; border: 1px solid #ECECEA; border-radius: 8px;
    padding: 10px 14px; overflow-x: auto;
    font: 12px/1.45 "SF Mono", Menlo, monospace; color: #24292F;
  }
  /* Terminal TUIs often draw Markdown tables without vertical borders: one
     horizontal run per column, with wrapped cell lines between separators.
     Those are reconstructed as a real responsive table, rather than turning
     every separator into its own horizontally scrolling PRE. */
  table.terminal-table {
    display: table; width: 100%; table-layout: fixed; overflow: visible;
    border: 1px solid #DDDDD8; border-radius: 8px; border-collapse: separate;
    border-spacing: 0; margin: 1em 0;
  }
  .terminal-table th, .terminal-table td {
    border: 0; border-right: 1px solid #E5E5E0; border-bottom: 1px solid #E5E5E0;
    vertical-align: top; white-space: normal; overflow-wrap: anywhere;
  }
  .terminal-table th:last-child, .terminal-table td:last-child { border-right: 0; }
  .terminal-table tr:last-child td { border-bottom: 0; }
  .terminal-table .terminal-cell-line + .terminal-cell-line { margin-top: .18em; }
  .terminal-accent, .terminal-table [data-terminal-style] {
    border-radius: 2px;
    -webkit-box-decoration-break: clone;
    box-decoration-break: clone;
  }
  .jblock { position: relative; margin: .9em 0; }
  .jblock pre { margin: 0; }
  .jtoggle {
    position: absolute; top: 7px; right: 8px; z-index: 1;
    font: 10.5px -apple-system, sans-serif; color: #57606A;
    background: #FFFFFFD8; border: 1px solid #DDDDD8; border-radius: 5px;
    padding: 2px 8px; cursor: pointer;
  }
  .jtoggle:hover { color: #1F2328; background: #FFF; }
  /* Dark variant — the editor's markdown PREVIEW opts in via UTRender.setTheme so it
     matches the app theme. The Renders panel (⇧⌘M) never calls setTheme, so it stays
     the light reading surface. bg/fg come from the app (--ut-bg/--ut-fg); the rest is
     a tasteful dark palette. */
  html.dark body { color: var(--ut-fg, #c9d1d9); }
  html.dark h1, html.dark h2, html.dark h3, html.dark h4, html.dark th, html.dark strong { color: #e6edf3; }
  html.dark h1 { border-bottom-color: #30363d; }
  html.dark hr { border-top-color: #30363d; }
  html.dark a { color: #4493f8; }
  html.dark blockquote { border-left-color: #3b434b; color: #8b949e; }
  html.dark code { background: #6e768133; color: #c9d1d9; }
  html.dark pre, html.dark pre.term { background: #161b22; border-color: #30363d; color: #c9d1d9; }
  html.dark th, html.dark td { border-color: #30363d; }
  html.dark th { background: #161b22; }
  html.dark tr:nth-child(2n) td { background: #161b2266; }
  html.dark #empty { color: #6e7681; }
  html.dark .jtoggle { color: #8b949e; background: #161b22d8; border-color: #30363d; }
  html.dark .jtoggle:hover { color: #e6edf3; background: #161b22; }
  /* Artifact documents are already a full-screen reading destination. Let the
     copy use that space instead of inheriting Render's intentionally narrow
     740px folio. The width remains responsive at small window sizes, while the
     upper bound prevents truly unbounded lines on an ultrawide display. */
  html.artifact-reader body {
    box-sizing: border-box;
    width: 100%;
    max-width: min(1120px, calc(100vw - 48px));
    padding-left: clamp(24px, 5vw, 76px);
    padding-right: clamp(24px, 5vw, 76px);
  }
  @media (max-width: 720px) {
    html.artifact-reader body {
      max-width: 100%;
      padding-left: 22px;
      padding-right: 22px;
    }
  }
</style>
<script src="marked.min.js"></script>
<script src="katex/katex.min.js"></script>
<script src="hljs/highlight.min.js"></script>
</head>
<body>
<div id="out"><div id="empty">Nothing to render</div></div>
<script>
(function () {
  marked.setOptions({ gfm: true, breaks: false });

  // GROUND RULE: terminal content is a MIX of (a) markdown/TeX SOURCE shown as
  // raw text — worth rendering, (b) content the terminal ALREADY typeset
  // (box-drawn tables, aligned columns, rules) — must be preserved verbatim,
  // and (c) data (JSON), possibly line-broken mid-token by the TUI's own
  // wrapping. Markdown is therefore OPT-IN PER SEGMENT, never global: lines
  // with box-drawing/block characters form verbatim segments rendered exactly
  // as the terminal had them; only the prose runs between them get the
  // markdown/math/JSON pipeline. The cost asymmetry drives the bias: prose
  // accidentally shown monospace is mildly ugly, a table run through markdown
  // is destroyed.
  function markdownSurface() {
    const root = document.documentElement;
    root.classList.remove("terminal-fidelity");
    root.style.removeProperty("--term-bg");
    root.style.removeProperty("--term-fg");
    root.style.removeProperty("color-scheme");
  }

  function renderMarkdown(md, repairTerminalSource, terminal) {
    markdownSurface();
    const out = document.getElementById("out");
    if (!md || !md.trim()) {
      out.innerHTML = '<div id="empty">Nothing to render</div>';
      return;
    }

    try {
      window.UTRender.lastError = null;
      // Before interpreting fallback text as Markdown, remove any terminal-
      // typeset tables from that text and retain their exact styled cell rows.
      // Their placeholders are restored as responsive HTML tables after marked.
      const extracted = repairTerminalSource
        ? extractTerminalTables(md, terminal)
        : { text: md, tables: [] };
      md = extracted.text;
      // A transcript preserves real delimiters. The fallback terminal source
      // may come from a TUI that consumed only the OUTER \[...\] or \(...\)
      // escapes while leaving TeX commands intact; recover those bounded forms
      // before Markdown sees them. This is deliberately evidence-based rather
      // than treating every bracket/parenthesis as mathematics.
      if (repairTerminalSource) md = recoverTerminalMath(md);

      // Code fences are explicit author intent — shield them before segmentation
      // so a fence containing box art isn't split into a verbatim segment.
      const code = [];
      const text = md.replace(/^(```|~~~)[\s\S]*?^\1[ \t]*$/gm, (m) => {
        code.push(m); return "⟦UTCODE" + (code.length - 1) + "⟧";
      });

      jsonBlocks = [];
      let html = segment(text)
        .map((s) => s.verbatim
          ? '<pre class="term">' + escapeHtml(s.text) + "</pre>"
          : renderProse(s.text, code))
        .join("\n");
      html = restoreTerminalTables(html, extracted.tables);

      out.innerHTML = html;
      out.querySelectorAll("pre code").forEach((el) => hljs.highlightElement(el));
      applyTerminalAccents(out, terminal, extracted.tableLineIndexes);
    } catch (error) {
      // Rich rendering must fail closed without losing the user's output.
      window.UTRender.lastError = String(error && error.message || error);
      const pre = document.createElement("pre");
      pre.className = "term";
      pre.textContent = md;
      out.replaceChildren(pre);
    }
  }

  function hasTeXSignal(text) {
    const value = (text || "").trim();
    // Paths and URLs routinely contain underscores; treating those as stripped
    // inline TeX turns links such as (.../vlnverse_emr/...) into KaTeX italics.
    if (/(?:https?:\/\/|file:\/\/|www\.)/i.test(value) || /^[A-Za-z]:[\\/]/.test(value)) {
      return false;
    }
    if (/\\[A-Za-z]+/.test(value)) return true;
    // A sub/superscript is math-shaped only when its base is a single symbol.
    // This accepts x_i and D_{KL}, but not ordinary snake_case identifiers.
    return /(?:^|[^A-Za-z0-9_])[A-Za-z0-9][_\^]\s*(?:\{|[A-Za-z0-9])/.test(value);
  }

  function recoverTerminalMath(text) {
    // Never repair inside syntax that is already authoritative. In particular,
    // parentheses inside a valid display equation (D_{KL}(...)) are not missing
    // inline delimiters. Code is equally literal. Shield both before applying
    // the terminal-only recovery rules, then restore byte-for-byte.
    const protectedRuns = [];
    const protect = (value) => {
      protectedRuns.push(value);
      return "⟦UTKEEP" + (protectedRuns.length - 1) + "⟧";
    };
    text = text
      .replace(/^(```|~~~)[\s\S]*?^\1[ \t]*$/gm, protect)
      .replace(/`[^`\n]*`/g, protect)
      .replace(/\$\$[\s\S]*?\$\$/g, protect)
      .replace(/\\\[[\s\S]*?\\\]/g, protect)
      .replace(/\\\([\s\S]*?\\\)/g, protect);

    // Codex/Claude Markdown TUIs commonly display \[ and \] as standalone [ ]
    // rows. A leading heading marker can also be introduced when an equation's
    // standalone '=' line was consumed as Setext syntax.
    text = text.replace(/^[ \t]*(?:#{1,6}[ \t]+)?\[[ \t]*\n([\s\S]*?)\n[ \t]*(?:#{1,6}[ \t]+)?\][ \t]*$/gm,
      (whole, body) => hasTeXSignal(body) ? "\\[\n" + body + "\n\\]" : whole);

    // Inline \(...\) loses only the delimiter backslashes in the same TUIs,
    // leaving forms such as (\lambda_c). Do not touch ordinary prose parens.
    text = text.replace(/\(([^()\n]{1,400})\)/g, (whole, body, offset, full) => {
      if (offset > 0 && full[offset - 1] === "\\") return whole;
      return hasTeXSignal(body) ? "\\(" + body + "\\)" : whole;
    });
    return text.replace(/⟦UTKEEP(\d+)⟧/g, (_, i) => protectedRuns[+i]);
  }

  function darkColor(hex) {
    const match = /^#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i.exec(hex || "");
    if (!match) return true;
    const rgb = match.slice(1).map((x) => parseInt(x, 16) / 255)
      .map((x) => x <= .04045 ? x / 12.92 : Math.pow((x + .055) / 1.055, 2.4));
    return .2126 * rgb[0] + .7152 * rgb[1] + .0722 * rgb[2] < .42;
  }

  function safeLink(raw) {
    if (!raw) return null;
    try {
      const url = new URL(raw);
      return ["http:", "https:", "file:", "mailto:"].includes(url.protocol) ? raw : null;
    } catch (_) { return null; }
  }

  function renderTerminal(term) {
    const out = document.getElementById("out");
    const root = document.documentElement;
    root.classList.remove("dark");
    root.classList.add("terminal-fidelity");
    root.style.setProperty("--term-bg", (term && term.background) || "#11131A");
    root.style.setProperty("--term-fg", (term && term.foreground) || "#E8E9EE");
    root.style.setProperty("color-scheme", darkColor(term && term.background) ? "dark" : "light");
    if (!term || !term.lines || !term.lines.length) {
      out.innerHTML = '<div id="empty">Nothing to render</div>';
      return;
    }

    const page = document.createElement("div");
    page.className = "terminal-page";
    page.style.minWidth = Math.max(1, term.columns || 1) + "ch";
    if (term.fontFamily) page.style.fontFamily = term.fontFamily;

    for (const line of term.lines) {
      const row = document.createElement("div");
      row.className = "terminal-row";
      row.dataset.wrapped = line.wrapped ? "true" : "false";
      if (!line.runs || !line.runs.length) {
        row.textContent = "\u00a0";
      } else {
        for (const run of line.runs) {
          const style = term.styles[run.style] || {};
          const href = safeLink(run.link);
          const span = document.createElement(href ? "a" : "span");
          if (href) {
            span.href = href;
            span.rel = "noreferrer";
          }
          span.textContent = run.text || "";
          if (style.foreground) span.style.color = style.foreground;
          if (style.background && style.background !== term.background) {
            span.style.backgroundColor = style.background;
          }
          if (style.bold) span.style.fontWeight = "700";
          if (style.italic) span.style.fontStyle = "italic";
          const decorations = [];
          if (style.underline) decorations.push("underline");
          if (style.strikethrough) decorations.push("line-through");
          if (decorations.length) span.style.textDecorationLine = decorations.join(" ");
          if (style.underline) span.style.textDecorationStyle = style.underline;
          if (style.underlineColor) span.style.textDecorationColor = style.underlineColor;
          row.appendChild(span);
        }
      }
      page.appendChild(row);
    }
    out.replaceChildren(page);
  }

  let activeDocument = null;
  function presentDocument(doc, presentation) {
    activeDocument = doc;
    const out = document.getElementById("out");
    out.dataset.sourceOrigin = (doc && doc.sourceOrigin) || "terminal";
    if (presentation === "terminal") renderTerminal(doc && doc.terminal);
    else renderMarkdown((doc && doc.source) || "",
      !!doc && (doc.sourceOrigin === "terminal" || doc.sourceOrigin === "selection"),
      doc && doc.terminal);
  }

  // Box-drawing, block elements, and legacy +---+ rules mark a line as
  // "already typeset by the terminal". GFM pipe tables (ASCII |) stay prose so
  // real markdown tables keep rendering as HTML tables.
  const ARTY = /[─-╿▀-▟]/;
  const ASCII_RULE = /^[ \t]*\+[-+=]{4,}\+?[ \t]*$/;

  function segment(text) {
    const segs = [];
    let cur = null, curVerbatim = false;
    const push = () => {
      if (cur) segs.push({ verbatim: curVerbatim, text: cur.join("\n").replace(/\n+$/, "") });
      cur = null;
    };
    for (const ln of text.split("\n")) {
      const arty = ARTY.test(ln) || ASCII_RULE.test(ln);
      const blank = ln.trim() === "";
      if (!cur) { cur = [ln]; curVerbatim = arty; continue; }
      if (blank || arty === curVerbatim) { cur.push(ln); continue; }
      push();
      cur = [ln];
      curVerbatim = arty;
    }
    push();
    return segs;
  }

  const HORIZONTAL_GLYPHS = new Set(Array.from("─━═╌╍┄┅┈┉-"));

  function terminalLineText(line) {
    return ((line && line.runs) || []).map((run) => run.text || "").join("");
  }

  // Return the column-rule spans for a borderless terminal table. A single
  // horizontal rule is prose decoration; two or more separated runs encode
  // actual column geometry (the shape used by Codex's rendered GFM tables).
  function terminalTableColumns(text) {
    const chars = Array.from(text || "");
    const runs = [];
    for (let i = 0; i < chars.length;) {
      if (chars[i] === " " || chars[i] === "\t") { i++; continue; }
      if (!HORIZONTAL_GLYPHS.has(chars[i])) return null;
      const start = i;
      while (i < chars.length && HORIZONTAL_GLYPHS.has(chars[i])) i++;
      if (i - start >= 3) runs.push({ start, end: i });
    }
    return runs.length >= 2 ? runs : null;
  }

  function terminalSourceForLines(lines) {
    const logical = [];
    for (const line of lines) {
      const text = terminalLineText(line).replace(/[ \t]+$/, "");
      if (line && line.wrapped && logical.length) logical[logical.length - 1] += text;
      else logical.push(text);
    }
    return logical.map((line) => {
      const body = line.replace(/^ +/, "");
      if (body.startsWith("⏺ ") || body.startsWith("⎿ ")) return body.slice(2);
      return line;
    }).join("\n");
  }

  // Replace only table blocks that can be matched byte-for-byte against the
  // fallback source extracted from this same terminal frame. If matching ever
  // fails, the old plain segmentation remains the safe fallback.
  function extractTerminalTables(md, term) {
    const result = { text: md, tables: [], tableLineIndexes: new Set() };
    if (!term || !Array.isArray(term.lines) || !term.lines.length) return result;

    const matches = [];
    const fenced = [];
    md.replace(/^(```|~~~)[\s\S]*?^\1[ \t]*$/gm, (value, _, offset) => {
      fenced.push({ start: offset, end: offset + value.length });
      return value;
    });
    let cursor = 0;
    for (let i = 0; i < term.lines.length;) {
      if (!terminalLineText(term.lines[i]).trim()) { i++; continue; }
      const start = i;
      while (i < term.lines.length && terminalLineText(term.lines[i]).trim()) i++;
      const end = i;
      const lines = term.lines.slice(start, end);
      let columns = null;
      for (const line of lines) {
        columns = terminalTableColumns(terminalLineText(line));
        if (columns) break;
      }
      if (!columns) continue;

      const source = terminalSourceForLines(lines);
      let at = md.indexOf(source, cursor);
      if (at < 0) at = md.indexOf(source);
      if (at < 0) continue;
      if (fenced.some((range) => at < range.end && at + source.length > range.start)) continue;
      const table = renderStyledTerminalTable(lines, columns, term);
      if (!table) continue;

      const index = result.tables.length;
      result.tables.push(table);
      matches.push({ start: at, end: at + source.length, index });
      for (let line = start; line < end; line++) result.tableLineIndexes.add(line);
      cursor = at + source.length;
    }

    for (let i = matches.length - 1; i >= 0; i--) {
      const match = matches[i];
      result.text = result.text.slice(0, match.start) +
        "\n\n⟦UTTERMTABLE" + match.index + "⟧\n\n" + result.text.slice(match.end);
    }
    return result;
  }

  function terminalLineCells(line) {
    const cells = [];
    for (const run of ((line && line.runs) || [])) {
      for (const character of Array.from(run.text || "")) {
        cells.push({ character, style: run.style || 0, link: run.link || null });
      }
    }
    return cells;
  }

  function trimTerminalCells(cells) {
    let start = 0, end = cells.length;
    while (start < end && /\s/.test(cells[start].character)) start++;
    while (end > start && /\s/.test(cells[end - 1].character)) end--;
    return cells.slice(start, end);
  }

  function sliceTerminalTableLine(line, columns) {
    const cells = terminalLineCells(line);
    return columns.map((column, index) => {
      const end = index + 1 < columns.length ? columns[index + 1].start : cells.length;
      return trimTerminalCells(cells.slice(column.start, end));
    });
  }

  function terminalCellText(cells) {
    return (cells || []).map((cell) => cell.character).join("");
  }

  function splitTerminalTableChunk(lines, columns) {
    const rows = [];
    let current = [];
    for (const line of lines) {
      const sliced = sliceTerminalTableLine(line, columns);
      const firstColumnStarts = terminalCellText(sliced[0]).trim() !== "";
      if (current.length && firstColumnStarts) {
        rows.push(current);
        current = [];
      }
      current.push(sliced);
    }
    if (current.length) rows.push(current);
    return rows;
  }

  function renderStyledTerminalTable(lines, columns, term) {
    const chunks = [];
    let current = [];
    let sawRule = false;
    for (const line of lines) {
      if (terminalTableColumns(terminalLineText(line))) {
        if (current.length) chunks.push({ lines: current, header: !sawRule });
        current = [];
        sawRule = true;
      } else {
        current.push(line);
      }
    }
    if (current.length) chunks.push({ lines: current, header: !sawRule });
    if (!sawRule || !chunks.length) return "";

    const headerRows = [], bodyRows = [];
    for (const chunk of chunks) {
      for (const row of splitTerminalTableChunk(chunk.lines, columns)) {
        (chunk.header ? headerRows : bodyRows).push(row);
      }
    }
    if (!headerRows.length && !bodyRows.length) return "";

    const widths = columns.map((column, index) =>
      Math.max(1, (index + 1 < columns.length ? columns[index + 1].start : column.end) - column.start));
    const total = widths.reduce((sum, width) => sum + width, 0);
    let html = '<table class="terminal-table"><colgroup>' +
      widths.map((width) => '<col style="width:' + (100 * width / total).toFixed(3) + '%">').join("") +
      "</colgroup>";
    if (headerRows.length) {
      html += "<thead>" + headerRows.map((row) => renderTerminalTableRow(row, term, true)).join("") + "</thead>";
    }
    if (bodyRows.length) {
      html += "<tbody>" + bodyRows.map((row) => renderTerminalTableRow(row, term, false)).join("") + "</tbody>";
    }
    return html + "</table>";
  }

  function renderTerminalTableRow(rowLines, term, header) {
    const tag = header ? "th" : "td";
    const columns = rowLines[0] ? rowLines[0].length : 0;
    let html = "<tr>";
    for (let column = 0; column < columns; column++) {
      const visualLines = rowLines.map((line) => line[column]).filter((cells) => cells && cells.length);
      html += "<" + tag + ">" + (visualLines.length
        ? visualLines.map((cells) => '<div class="terminal-cell-line">' +
            renderStyledTerminalCells(cells, term) + "</div>").join("")
        : "&nbsp;") + "</" + tag + ">";
    }
    return html + "</tr>";
  }

  function renderStyledTerminalCells(cells, term) {
    const groups = [];
    for (const cell of cells) {
      const previous = groups[groups.length - 1];
      if (previous && previous.style === cell.style && previous.link === cell.link) {
        previous.text += cell.character;
      } else {
        groups.push({ text: cell.character, style: cell.style, link: cell.link });
      }
    }
    return groups.map((group) => {
      const href = safeLink(group.link);
      const tag = href ? "a" : "span";
      const style = terminalStyleCSS(term, group.style);
      return "<" + tag + ' data-terminal-style="' + group.style + '"' +
        (href ? ' href="' + escapeAttribute(href) + '" rel="noreferrer"' : "") +
        (style ? ' style="' + escapeAttribute(style) + '"' : "") + ">" +
        escapeHtml(group.text) + "</" + tag + ">";
    }).join("");
  }

  function terminalStyleCSS(term, styleIndex) {
    const style = (term && term.styles && term.styles[styleIndex]) || {};
    const css = [];
    if (style.foreground && String(style.foreground).toLowerCase() !== String(term.foreground || "").toLowerCase()) {
      css.push("color:" + readablePaperColor(style.foreground));
    }
    if (style.background && String(style.background).toLowerCase() !== String(term.background || "").toLowerCase()) {
      css.push("background-color:" + style.background, "padding:0 .08em");
    }
    if (style.bold) css.push("font-weight:700");
    if (style.italic) css.push("font-style:italic");
    const decoration = [];
    if (style.underline) decoration.push("underline");
    if (style.strikethrough) decoration.push("line-through");
    if (decoration.length) css.push("text-decoration-line:" + decoration.join(" "));
    if (style.underline) css.push("text-decoration-style:" + style.underline);
    if (style.underlineColor) css.push("text-decoration-color:" + readablePaperColor(style.underlineColor));
    return css.join(";");
  }

  function readablePaperColor(hex) {
    const match = /^#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i.exec(hex || "");
    if (!match) return hex;
    let rgb = match.slice(1).map((value) => parseInt(value, 16));
    const linear = (value) => {
      value /= 255;
      return value <= .04045 ? value / 12.92 : Math.pow((value + .055) / 1.055, 2.4);
    };
    const luminance = (values) => .2126 * linear(values[0]) + .7152 * linear(values[1]) + .0722 * linear(values[2]);
    const paper = .965;
    let contrast = (paper + .05) / (luminance(rgb) + .05);
    while (contrast < 4.5 && rgb.some((value) => value > 0)) {
      rgb = rgb.map((value) => Math.max(0, Math.round(value * .82)));
      contrast = (paper + .05) / (luminance(rgb) + .05);
    }
    return "#" + rgb.map((value) => value.toString(16).padStart(2, "0")).join("");
  }

  function restoreTerminalTables(html, tables) {
    if (!tables || !tables.length) return html;
    return html
      .replace(/<p>\s*⟦UTTERMTABLE(\d+)⟧\s*<\/p>/g, (_, index) => tables[+index] || "")
      .replace(/⟦UTTERMTABLE(\d+)⟧/g, (_, index) => tables[+index] || "");
  }

  // Semantic Markdown stays semantic, but intentional terminal colors can be
  // carried onto it after parsing. A terminal snapshot contains considerably
  // more than the selected answer (old tool diffs, prompts, status chrome), so
  // a colored run is NEVER located by its text alone. Instead, complete prose
  // lines and complete table rows must first align to one unique DOM block;
  // only styles at the corresponding character offsets are then transferred.
  // This keeps real accents while making short values such as "62" incapable
  // of borrowing a background from an unrelated line in scrollback.
  function applyTerminalAccents(root, term, excludedLineIndexes) {
    if (!term || !Array.isArray(term.lines) || !Array.isArray(term.styles)) return;
    const excluded = excludedLineIndexes || new Set();
    const table = terminalTableStyleUnits(term, excluded);
    const units = table.units.concat(terminalProseStyleUnits(term, excluded, table.lineIndexes));
    const tableCandidates = contextCandidates(root, "table");
    const proseCandidates = contextCandidates(root, "prose");
    const operations = [];
    const prepared = units.map((unit) => ({ unit, normalized: normalizeStyledSegments(unit.segments) }));
    const latestContext = new Map();
    for (let i = 0; i < prepared.length; i++) {
      latestContext.set(prepared[i].unit.kind + "\u0000" + prepared[i].normalized.text, i);
    }

    for (let unitIndex = 0; unitIndex < prepared.length; unitIndex++) {
      const { unit, normalized } = prepared[unitIndex];
      if (!credibleStyleContext(normalized.text)) continue;
      // The same output can appear more than once in scrollback (for example,
      // once in a tool diff and again in the final answer). The selected answer
      // is the newest occurrence, so an older identical context is stale.
      if (latestContext.get(unit.kind + "\u0000" + normalized.text) !== unitIndex) continue;
      const candidates = unit.kind === "table" ? tableCandidates : proseCandidates;
      const matches = [];
      for (const candidate of candidates) {
        const at = uniqueOccurrence(candidate.normalized.text, normalized.text);
        if (at >= 0) matches.push({ candidate, at });
      }
      // Nested/repeated prose and repeated historical output are deliberately
      // ambiguous. Dropping an accent is preferable to coloring the wrong text.
      if (matches.length !== 1) continue;
      collectStyleOperations(operations, matches[0].candidate, matches[0].at,
        normalized.styles, term);
    }
    applyStyleOperations(operations, term);
  }

  function styleHasAccent(term, styleIndex) {
    if (styleIndex === null || styleIndex === undefined) return false;
    const style = (term.styles && term.styles[styleIndex]) || {};
    const foregroundDiffers = style.foreground &&
      String(style.foreground).toLowerCase() !== String(term.foreground || "").toLowerCase();
    const backgroundDiffers = style.background &&
      String(style.background).toLowerCase() !== String(term.background || "").toLowerCase();
    return !!(foregroundDiffers || backgroundDiffers);
  }

  function terminalTableStyleUnits(term, excluded) {
    const units = [];
    const lineIndexes = new Set();
    for (let i = 0; i < term.lines.length;) {
      if (excluded.has(i) || !terminalLineText(term.lines[i]).trim()) { i++; continue; }
      const start = i;
      while (i < term.lines.length && !excluded.has(i) && terminalLineText(term.lines[i]).trim()) i++;
      const end = i;
      const lines = term.lines.slice(start, end);
      let columns = null;
      for (const line of lines) {
        columns = terminalTableColumns(terminalLineText(line));
        if (columns) break;
      }
      if (!columns) continue;

      const chunks = [];
      let current = [];
      let ruleCount = 0;
      for (const line of lines) {
        if (terminalTableColumns(terminalLineText(line))) {
          if (current.length) chunks.push(current);
          current = [];
          ruleCount++;
        } else {
          current.push(line);
        }
      }
      if (current.length) chunks.push(current);
      if (!ruleCount) continue;

      for (let line = start; line < end; line++) lineIndexes.add(line);
      for (const chunk of chunks) {
        // Codex draws a rule between every body row. In that form, every
        // visual line between rules is one logical row even when the first
        // cell itself wraps ("Router-" / "trained" / "Step900" / "router").
        // A one-rule Markdown table has no body separators and still needs the
        // first-column row-start heuristic used by the fallback renderer.
        const rows = ruleCount > 1
          ? [chunk.map((line) => sliceTerminalTableLine(line, columns))]
          : splitTerminalTableChunk(chunk, columns);
        for (const row of rows) {
          const segments = [];
          const columnCount = row[0] ? row[0].length : 0;
          for (let column = 0; column < columnCount; column++) {
            const visualCells = row.map((visualLine) => visualLine[column])
              .filter((cells) => cells && cells.length);
            if (!visualCells.length) continue;
            if (segments.length) segments.push({ text: " ", style: null });
            let previousCellText = "";
            for (const cells of visualCells) {
              // A TUI line break after a hyphen is a word continuation, not
              // authored whitespace (Router- + trained => Router-trained).
              if (previousCellText && !/[-‐‑‒–—]$/.test(previousCellText)) {
                segments.push({ text: " ", style: null });
              }
              appendCellSegments(segments, cells);
              previousCellText = terminalCellText(cells).trimEnd();
            }
          }
          if (segments.length) units.push({ kind: "table", segments });
        }
      }
    }
    return { units, lineIndexes };
  }

  function appendCellSegments(segments, cells) {
    for (const cell of cells) {
      const previous = segments[segments.length - 1];
      if (previous && previous.style === cell.style) previous.text += cell.character;
      else segments.push({ text: cell.character, style: cell.style });
    }
  }

  function terminalProseStyleUnits(term, excluded, tableLineIndexes) {
    const units = [];
    let current = null;
    const flush = () => {
      if (current && current.segments.length) units.push(current);
      current = null;
    };
    for (let i = 0; i < term.lines.length; i++) {
      const line = term.lines[i];
      const text = terminalLineText(line);
      if (excluded.has(i) || tableLineIndexes.has(i) || terminalTableColumns(text) || !text.trim()) {
        flush();
        continue;
      }
      if (!line.wrapped || !current) {
        flush();
        current = { kind: "prose", segments: [] };
      }
      for (const run of (line.runs || [])) {
        current.segments.push({ text: run.text || "", style: run.style });
      }
    }
    flush();
    return units;
  }

  function normalizeStyledSegments(segments) {
    let text = "";
    const styles = [];
    let pendingSpace = false;
    let pendingSpaceStyle;
    for (const segment of segments) {
      const value = segment.text || "";
      for (let i = 0; i < value.length; i++) {
        const character = value[i];
        if (/\s/.test(character)) {
          if (text.length > 0) {
            if (!pendingSpace) pendingSpaceStyle = segment.style;
            else if (pendingSpaceStyle !== segment.style) pendingSpaceStyle = null;
            pendingSpace = true;
          }
          continue;
        }
        if (pendingSpace) {
          text += " ";
          styles.push(pendingSpaceStyle === undefined ? null : pendingSpaceStyle);
          pendingSpace = false;
          pendingSpaceStyle = undefined;
        }
        text += character;
        styles.push(segment.style === undefined ? null : segment.style);
      }
    }
    // Agent/list chrome is not part of the authored Markdown DOM. Removing it
    // here (with the parallel style slots) keeps offsets aligned afterwards.
    const prefix = text.match(/^(?:(?:⏺|⎿|›|•|[-+*]|\d+\.)\s+)/);
    if (prefix) {
      text = text.slice(prefix[0].length);
      styles.splice(0, prefix[0].length);
    }
    return { text, styles };
  }

  function credibleStyleContext(text) {
    if (!text || text.length < 12 || text.length > 2000) return false;
    return (text.match(/[\p{L}\p{N}]+/gu) || []).length >= 2;
  }

  function contextCandidates(root, kind) {
    const selector = kind === "table"
      ? "table:not(.terminal-table) tr"
      : "h1,h2,h3,h4,h5,h6,p,li,blockquote";
    return Array.from(root.querySelectorAll(selector))
      .filter((element) => !element.closest("pre,code,.katex,.terminal-table,[data-terminal-style]"))
      .filter((element) => kind === "table" || !element.querySelector("p,li,blockquote"))
      .map((element) => ({ element, normalized: normalizedElementMap(element) }))
      .filter((candidate) => candidate.normalized.text.length > 0);
  }

  // Build normalized visible text together with the exact DOM character that
  // produced each position. Table cells need a virtual separator because raw
  // textContent concatenates adjacent TD/TH nodes without whitespace.
  function normalizedElementMap(element) {
    const raw = [];
    const virtualSpace = () => raw.push({ character: " ", node: null, offset: -1 });
    const visit = (node) => {
      if (node.nodeType === Node.TEXT_NODE) {
        const value = node.nodeValue || "";
        for (let i = 0; i < value.length; i++) {
          raw.push({ character: value[i], node, offset: i });
        }
        return;
      }
      if (node.nodeType !== Node.ELEMENT_NODE) return;
      if (node.tagName === "BR") { virtualSpace(); return; }
      const children = Array.from(node.childNodes);
      for (let i = 0; i < children.length; i++) {
        if (i > 0 && node.tagName === "TR") virtualSpace();
        visit(children[i]);
      }
    };
    visit(element);

    let text = "";
    const map = [];
    let pendingSpace = false;
    let pendingSpaceMap = null;
    for (const item of raw) {
      if (/\s/.test(item.character)) {
        if (text.length > 0) {
          pendingSpace = true;
          if (!pendingSpaceMap && item.node) {
            pendingSpaceMap = { node: item.node, offset: item.offset };
          }
        }
        continue;
      }
      if (pendingSpace) {
        text += " ";
        map.push(pendingSpaceMap);
        pendingSpace = false;
        pendingSpaceMap = null;
      }
      text += item.character;
      map.push(item.node ? { node: item.node, offset: item.offset } : null);
    }
    return { text, map };
  }

  function uniqueOccurrence(haystack, needle) {
    const first = haystack.indexOf(needle);
    if (first < 0) return -1;
    return haystack.indexOf(needle, first + 1) < 0 ? first : -1;
  }

  function collectStyleOperations(operations, candidate, contextStart, styles, term) {
    let i = 0;
    while (i < styles.length) {
      const styleIndex = styles[i];
      let end = i + 1;
      while (end < styles.length && styles[end] === styleIndex) end++;
      if (styleHasAccent(term, styleIndex)) {
        let runStart = -1;
        let previous = null;
        for (let offset = i; offset < end; offset++) {
          const mapped = candidate.normalized.map[contextStart + offset];
          const contiguous = mapped && previous && mapped.node === previous.node &&
            mapped.offset === previous.offset + 1;
          if (!mapped || (previous && !contiguous)) {
            if (runStart >= 0 && previous) {
              operations.push({ node: previous.node, start: runStart,
                end: previous.offset + 1, style: styleIndex });
            }
            runStart = mapped ? mapped.offset : -1;
          } else if (!previous) {
            runStart = mapped.offset;
          }
          previous = mapped;
        }
        if (runStart >= 0 && previous) {
          operations.push({ node: previous.node, start: runStart,
            end: previous.offset + 1, style: styleIndex });
        }
      }
      i = end;
    }
  }

  function applyStyleOperations(operations, term) {
    const byNode = new Map();
    for (const operation of operations) {
      if (!operation.node || operation.start >= operation.end) continue;
      const list = byNode.get(operation.node) || [];
      if (!list.some((item) => item.start === operation.start && item.end === operation.end &&
        item.style === operation.style)) {
        list.push(operation);
        byNode.set(operation.node, list);
      }
    }
    for (const [node, values] of byNode) {
      values.sort((a, b) => a.start - b.start || a.end - b.end);
      const accepted = [];
      for (const value of values) {
        if (!accepted.length || value.start >= accepted[accepted.length - 1].end) accepted.push(value);
      }
      if (!accepted.length || !node.parentNode) continue;
      const source = node.nodeValue || "";
      const fragment = document.createDocumentFragment();
      let cursor = 0;
      for (const value of accepted) {
        fragment.appendChild(document.createTextNode(source.slice(cursor, value.start)));
        const span = document.createElement("span");
        span.className = "terminal-accent";
        span.dataset.terminalStyle = String(value.style);
        span.style.cssText = terminalStyleCSS(term, value.style);
        span.textContent = source.slice(value.start, value.end);
        fragment.appendChild(span);
        cursor = value.end;
      }
      fragment.appendChild(document.createTextNode(source.slice(cursor)));
      node.parentNode.replaceChild(fragment, node);
    }
  }

  function escapeAttribute(value) {
    return escapeHtml(String(value)).replace(/"/g, "&quot;");
  }

  // The markdown/math/JSON pipeline, applied to ONE prose segment:
  // (1) shield inline code, (2) lift JSON objects into blocks, (3) extract
  // math into placeholders BEFORE marked (it mangles raw TeX: \! \_ escapes,
  // _emphasis_), (4) un-shield code + marked, (5) restore math via
  // katex.renderToString and JSON via styled blocks.
  //
  // Inline $…$ tolerates single newlines: agent TUIs hard-wrap their output at
  // the pane width, so a span often straddles a line break. Markdown renders a
  // single newline inside a paragraph as a space anyway, so joining is exactly
  // its semantics. A blank line still terminates, and a length cap stops a
  // stray $ from pairing across half the document.
  function renderProse(seg, code) {
    let text = seg.replace(/`[^`\n]+`/g, (m) => {
      code.push(m); return "⟦UTCODE" + (code.length - 1) + "⟧";
    });

    {
      const spans = findJSONSpans(text);
      for (let k = spans.length - 1; k >= 0; k--) {
        const [a, b, parsed] = spans[k];
        const idx = jsonBlocks.length;
        jsonBlocks.push({ raw: text.slice(a, b), pretty: prettyJSON(parsed), pretty_on: true });
        text = text.slice(0, a) + "\n\n⟦UTJSON" + idx + "⟧\n\n" + text.slice(b);
      }
    }

    const math = [];
    const stash = (tex, display) => {
      math.push({ tex, display });
      return "⟦UTMATH" + (math.length - 1) + "⟧";
    };
    const sane = (t) => !/\n[ \t]*\n/.test(t) && /[\\^_{}]|[a-zA-Z]/.test(t);
    text = text
      .replace(/\$\$([\s\S]+?)\$\$/g, (_, t) => stash(t, true))
      .replace(/\\\[([\s\S]+?)\\\]/g, (_, t) => stash(t, true))
      .replace(/\\\(([\s\S]+?)\\\)/g, (m, t) => sane(t) ? stash(t, false) : m)
      .replace(/\$([^\s$][^$]{0,400}?[^\s$]|\S)\$/g, (m, t) => sane(t) ? stash(t.replace(/\s*\n\s*/g, " "), false) : m);

    text = text.replace(/⟦UTCODE(\d+)⟧/g, (_, i) => code[+i]);
    let html = marked.parse(text);

    html = html.replace(/⟦UTMATH(\d+)⟧/g, (_, i) => {
      const m = math[+i];
      try {
        return katex.renderToString(m.tex, { displayMode: m.display, throwOnError: false });
      } catch (e) {
        return escapeHtml(m.tex);
      }
    });

    html = html.replace(/⟦UTJSON(\d+)⟧/g, (_, i) =>
      '<div class="jblock"><button class="jtoggle" data-i="' + i + '">Raw</button>' +
      '<pre><code class="language-json">' + escapeHtml(jsonBlocks[+i].pretty) + "</code></pre></div>");

    return html;
  }

  let jsonBlocks = [];

  // A balanced span must parse as JSON to qualify — but the TUI may have
  // hard-wrapped it MID-TOKEN at the pane width ("inplan\ne": 1.8), which puts
  // raw newlines inside strings/numbers. Retry order: verbatim, then newlines
  // removed (mid-token wrap), then newlines as spaces. No other repair —
  // Python reprs etc. stay text.
  function parseJSONish(cand) {
    for (const s of [cand, cand.replace(/[ \t]*\n[ \t]*/g, ""), cand.replace(/[ \t]*\n[ \t]*/g, " ")]) {
      try { return JSON.parse(s); } catch (e) { /* next */ }
    }
    return undefined;
  }

  // String-aware balanced-brace scan; a span qualifies only if it parses.
  function findJSONSpans(text) {
    const spans = [];
    let i = 0;
    while (i < text.length) {
      const c = text[i];
      if (c === "{" || c === "[") {
        const end = matchBracket(text, i);
        if (end > i) {
          const cand = text.slice(i, end + 1);
          if (cand.length >= 40) {
            const v = parseJSONish(cand);
            if (v && typeof v === "object" &&
                (Array.isArray(v) ? cand.length >= 80 : Object.keys(v).length >= 2)) {
              spans.push([i, end + 1, v]);
              i = end + 1;
              continue;
            }
          }
        }
      }
      i++;
    }
    return spans;
  }

  function matchBracket(text, start) {
    let depth = 0, inStr = false;
    const limit = Math.min(text.length, start + 50000);
    for (let i = start; i < limit; i++) {
      const ch = text[i];
      if (inStr) {
        if (ch === "\\") i++;
        else if (ch === '"') inStr = false;
      } else if (ch === '"') inStr = true;
      else if (ch === "{" || ch === "[") depth++;
      else if (ch === "}" || ch === "]") {
        depth--;
        if (depth === 0) return i;
        if (depth < 0) return -1;
      }
    }
    return -1;
  }

  function escapeHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  // Compact pretty-printer: anything that fits in ~64 chars stays on one line
  // (coordinate arrays, small tuples), bigger structures break per entry —
  // far denser than JSON.stringify(v, null, 2) for data-heavy objects.
  function prettyJSON(v, ind = "") {
    const one = JSON.stringify(v);
    if (one.length <= 64) return one;
    const ind2 = ind + "  ";
    if (Array.isArray(v)) {
      return "[\n" + v.map((x) => ind2 + prettyJSON(x, ind2)).join(",\n") + "\n" + ind + "]";
    }
    if (v && typeof v === "object") {
      return "{\n" + Object.entries(v).map(([k, x]) =>
        ind2 + JSON.stringify(k) + ": " + prettyJSON(x, ind2)).join(",\n") + "\n" + ind + "}";
    }
    return one;
  }

  // Per-block Format/Raw toggle (event delegation survives re-renders).
  document.addEventListener("click", (e) => {
    const btn = e.target.closest(".jtoggle");
    if (!btn) return;
    const b = jsonBlocks[+btn.dataset.i];
    if (!b) return;
    b.pretty_on = !b.pretty_on;
    btn.textContent = b.pretty_on ? "Raw" : "Format";
    const codeEl = btn.parentElement.querySelector("code");
    codeEl.textContent = b.pretty_on ? b.pretty : b.raw;
    delete codeEl.dataset.highlighted;   // hljs 11 refuses to re-highlight otherwise
    hljs.highlightElement(codeEl);
  });

  window.UTRender = {
    lastError: null,
    // Backwards-compatible plain Markdown entry point used by Files preview.
    set(md, px) { activeDocument = null; if (px) this.setZoom(px); renderMarkdown(md, false); },
    setDocument(doc, px, presentation) {
      if (px) this.setZoom(px);
      presentDocument(doc, presentation || "terminal");
    },
    setZoom(px) { document.body.style.fontSize = px + "px"; },
    setLayout(layout) {
      document.documentElement.classList.toggle("artifact-reader", layout === "artifact");
    },
    // Opt-in theming (the editor preview calls this; the Renders panel never does,
    // so it stays light). spec = { dark:bool, bg:'#hex', fg:'#hex' }.
    setTheme(spec) {
      spec = spec || {};
      var root = document.documentElement;
      root.classList.toggle("dark", !!spec.dark);
      if (spec.bg) root.style.setProperty("--ut-bg", spec.bg); else root.style.removeProperty("--ut-bg");
      if (spec.fg) root.style.setProperty("--ut-fg", spec.fg); else root.style.removeProperty("--ut-fg");
      var light = document.getElementById("hljs-light"), dark = document.getElementById("hljs-dark");
      if (light) light.disabled = !!spec.dark;
      if (dark) dark.disabled = !spec.dark;
    },
    inspect() {
      const out = document.getElementById("out");
      return {
        sourceOrigin: out.dataset.sourceOrigin || "",
        headings: out.querySelectorAll("h1,h2,h3,h4,h5,h6").length,
        tables: out.querySelectorAll("table").length,
        codeBlocks: out.querySelectorAll("pre code").length,

        inlineMath: out.querySelectorAll(".katex:not(.katex-display .katex)").length,
        links: out.querySelectorAll("a[href]").length,
        terminalRows: out.querySelectorAll(".terminal-row").length,
        terminalTables: out.querySelectorAll("table.terminal-table").length,
        terminalTableRows: out.querySelectorAll("table.terminal-table tr").length,
        terminalAccents: out.querySelectorAll(".terminal-accent,[data-terminal-style]").length,
        verbatimBlocks: out.querySelectorAll("pre.term").length,
        text: out.innerText,
        error: this.lastError,
      };
    },
  };
})();
</script>
</body>
