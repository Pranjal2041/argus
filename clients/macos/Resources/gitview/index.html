<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="github-dark.min.css" />
    <link rel="stylesheet" href="diff2html.min.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="topbar">
      <div id="branchinfo">
        <span id="branch">…</span>
        <span id="ab"></span>
      </div>
      <div id="tabs">
        <button id="tab-changes" class="tab active">Changes</button>
        <button id="tab-history" class="tab">History</button>
      </div>
      <div id="actions">
        <button id="btn-mode" title="side-by-side ⇄ inline">⇆</button>
        <button id="btn-refresh" title="Refresh">⟳</button>
        <button id="btn-lazygit" title="Open lazygit (write operations)">lazygit</button>
      </div>
    </div>

    <div id="view-changes" class="view">
      <div class="sidebar">
        <div class="filterbar"><input id="files-filter" placeholder="Filter files…" /></div>
        <div class="scroll" id="files"></div>
      </div>
      <div class="content" id="changes-diff"><div class="empty"><span class="big">⎇</span>Select a file — or “All changes”.</div></div>
    </div>

    <div id="view-history" class="view" style="display:none">
      <div class="sidebar wide">
        <div class="filterbar"><input id="log-filter" placeholder="Filter commits (subject, author, hash)…" /></div>
        <div class="scroll" id="commits"></div>
      </div>
      <div class="content" id="history-diff"><div class="empty"><span class="big">◉</span>Select a commit.</div></div>
    </div>

    <div id="view-blame" class="view" style="display:none">
      <div class="blame-head">
        <button id="blame-back">← back</button>
        <span id="blame-path"></span>
      </div>
      <div class="content full" id="blame-body"></div>
    </div>

    <div id="overlay" style="display:none"><div id="overlay-msg"></div></div>

    <script src="highlight.min.js"></script>
    <script src="diff2html-ui-base.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
