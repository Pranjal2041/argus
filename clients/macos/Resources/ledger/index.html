<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Argus · Activity Ledger</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="wrap">
  <aside id="drawer">
    <div id="brand">
      <div class="eye">Argus</div>
      <h1>Activity<br><em>Ledger</em></h1>
      <div class="sub">the raw record, read back</div>
    </div>
    <div id="days"></div>
    <div id="dirline" title="open the journal folder"></div>
  </aside>
  <main id="main">
    <div id="head">
      <div id="daytitle">—</div>
      <div id="counts"></div>
      <div id="live" title="re-read the journal">refresh</div>
    </div>
    <div id="strip"></div>
    <div id="striplabels"></div>
    <div id="filters"></div>
    <div id="ledger"></div>
    <div id="foot"></div>
  </main>
</div>
<script src="app.js"></script>
</body>
</html>
